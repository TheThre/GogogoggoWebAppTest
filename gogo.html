<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram WebApp Log</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Используем переменные темы Telegram для автоматической смены день/ночь */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px; /* Важно 16px, чтобы iPhone не зумил поле ввода */
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">Введите сообщение для лога</h2>
    <input type="text" id="user_text" placeholder="Ваш текст тут...">
    <button id="send_data">Отправить боту</button>
</div>

<script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    const sendBtn = document.getElementById('send_data');
    const userInput = document.getElementById('user_text');

    // Сообщаем Телеграму, что приложение готово и его можно показать
    tg.ready();
    tg.expand(); // Разворачиваем на максимум

    // Обработка клика
    sendBtn.addEventListener('click', () => {
        const val = userInput.value.trim();

        if (val === "") {
            tg.showAlert("Пожалуйста, введите текст!");
            return;
        }

        // Отправка данных боту (событие web_app_data)
        // ВАЖНО: Работает только если WebApp открыт через кнопку меню или клавиатуры
        tg.sendData(val);
        
        // Закрываем окно после отправки
        tg.close();
    });
</script>

</body>
</html>
