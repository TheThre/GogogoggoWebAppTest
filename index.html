<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebApp Logger</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container { width: 100%; max-width: 350px; text-align: center; margin-top: 50px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Лог-панель</h2>
        <input type="text" id="log_input" placeholder="Введите текст...">
        <button id="send_btn">ОТПРАВИТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const btn = document.getElementById('send_btn');
        const input = document.getElementById('log_input');

        tg.ready();
        tg.expand();

        btn.addEventListener('click', () => {
            const text = input.value.trim();
            if (!text) return tg.showAlert("Поле пустое!");

            // Отправляем данные боту
            tg.sendData(text);
            tg.close();
        });
    </script>
</body>
</html>
