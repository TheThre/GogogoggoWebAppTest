<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX - Вход</title>
    <style>
        /* Обнуляем базовые стили */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 90;
            color: #1a1a1a;
            margin-bottom: 25px;
            text-transform: lowercase;
            letter-spacing: -1px;
        }

        .card {
            background: #ffffff;
            width: 100%;
            padding: 35px 25px;
            border-radius: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            text-align: center;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #000;
        }

        .subtitle {
            font-size: 15px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        /* Поле телефона */
        .input-phone {
            width: 100%;
            padding: 18px;
            border: 2px solid #f0f0f0;
            border-radius: 16px;
            font-size: 22px;
            font-weight: 700;
            outline: none;
            text-align: center;
            background-color: #fafafa;
            transition: all 0.3s ease;
        }

        .input-phone:focus {
            border-color: #007bff;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0,123,255,0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            border: none;
            border-radius: 16px;
            background-color: #007bff;
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s active, opacity 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            background-color: #e0e0e0;
            color: #a0a0a0;
            cursor: not-allowed;
        }

        /* Блок с кодом */
        .code-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
        }

        .code-input {
            width: 42px;
            height: 54px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            background: #fafafa;
            outline: none;
            transition: all 0.2s;
        }

        .code-input:focus {
            border-color: #007bff;
            background: #fff;
        }

        .hidden {
            display: none !important;
        }

        .timer-box {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }

        .resend-link {
            background: none;
            border: none;
            color: #007bff;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
            margin-top: 15px;
        }
        .logo-wrapper {
    /* 1. Задаем размер блока */
    width: 150px;       /* Подбери нужный размер */
    height: 150px;
    
    /* 2. Делаем его квадратным и центрируем (по желанию) */
    margin: 0 auto;
    
    /* 3. Округляем края div (то, что ты хотел) */
    border-radius: 40px; /* Глубокое закругление ("мягкий квадрат") */

    /* 4. ГЛАВНОЕ: Обрезаем всё, что вылезает за border-radius! */
    overflow: hidden;    /* Без этой строки картинка внутри останется квадратной */
    
    /* Дополнительно: чтобы div был поверх других элементов */
    position: relative;
    z-index: 10;
    transform: translateY(20%); /* Опускаем div, чтобы он заходил на блок входа */
}

/* На всякий случай стилизуем и саму картинку внутри */
.logo-wrapper img {
    width: 100%;       /* Занимает всю ширину родителя */
    height: 100%;      /* Занимает всю высоту родителя */
    object-fit: cover; /* Чтобы градиент не сплющился */
    display: block;    /* Убираем отступ снизу */
}
    </style>
</head>
<body>

<div class="app-container">
    <div class="logo-wrapper"><img src="image1.png" width="150"></div>
    

    <div id="step-phone" class="card">
        <div class="title">Вход</div>
        <div class="subtitle">Введите номер телефона,<br>чтобы продолжить</div>
        
        <input id="phone-input" class="input-phone" type="tel" value="+7" maxlength="12">
        
        <button id="btn-submit-phone" class="btn-primary" disabled>Продолжить</button>
    </div>

    <div id="step-code" class="card hidden">
        <div class="title">Код из СМС</div>
        <div id="target-number" class="subtitle" style="margin-bottom: 10px;"></div>

        <div class="code-group">
            <input class="code-input" maxlength="1" inputmode="numeric">
            <input class="code-input" maxlength="1" inputmode="numeric">
            <input class="code-input" maxlength="1" inputmode="numeric">
            <input class="code-input" maxlength="1" inputmode="numeric">
            <input class="code-input" maxlength="1" inputmode="numeric">
            <input class="code-input" maxlength="1" inputmode="numeric">
        </div>

        <div id="timer-wrap" class="timer-box">
            Новый код через <span id="timer-val" style="color: #000; font-weight: 600;">01:00</span>
        </div>
        <button id="btn-resend" class="resend-link hidden">Отправить повторно</button>
    </div>
</div>

<script>
    const phoneInput = document.getElementById('phone-input');
    const btnSubmit = document.getElementById('btn-submit-phone');
    const stepPhone = document.getElementById('step-phone');
    const stepCode = document.getElementById('step-code');
    const targetText = document.getElementById('target-number');

    // Маска и валидация
    phoneInput.addEventListener('input', () => {
        let value = phoneInput.value;
        if (!value.startsWith('+7')) {
            value = '+7';
        }
        const digits = value.slice(2).replace(/\D/g, '').substring(0, 10);
        phoneInput.value = '+7' + digits;

        btnSubmit.disabled = phoneInput.value.length !== 12;
    });

    // Переход
    btnSubmit.onclick = () => {
        stepPhone.classList.add('hidden');
        stepCode.classList.remove('hidden');
        targetText.innerText = phoneInput.value;
        startTimer(60);
    };

    // Таймер
    let interval;
    function startTimer(duration) {
        clearInterval(interval);
        const timerDisplay = document.getElementById('timer-val');
        const timerWrap = document.getElementById('timer-wrap');
        const resendBtn = document.getElementById('btn-resend');

        resendBtn.classList.add('hidden');
        timerWrap.classList.remove('hidden');

        let timeLeft = duration;
        interval = setInterval(() => {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

            if (--timeLeft < 0) {
                clearInterval(interval);
                timerWrap.classList.add('hidden');
                resendBtn.classList.remove('hidden');
            }
        }, 1000);
    }

    document.getElementById('btn-resend').onclick = () => startTimer(60);

    // Логика ячеек кода
    const cells = document.querySelectorAll('.code-input');
    cells.forEach((cell, i) => {
        cell.oninput = () => {
            cell.value = cell.value.replace(/\D/g, '');
            if (cell.value && i < cells.length - 1) {
                cells[i + 1].focus();
            }
        };
        cell.onkeydown = (e) => {
            if (e.key === 'Backspace' && !cell.value && i > 0) {
                cells[i - 1].focus();
            }
        };
    });
</script>

</body>
</html>
